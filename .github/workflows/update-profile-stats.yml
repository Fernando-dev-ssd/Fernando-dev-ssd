name: Update profile stats

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate SVG stats
        env:
          GH_USERNAME: Fernando-dev-ssd
          GH_TOKEN: ${{ secrets.GH_STATS_TOKEN }}
        run: node .github/scripts/update-profile-stats.js

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/github-stats.svg assets/top-langs.svg
          git diff --staged --quiet || git commit -m "chore: update profile stats"
          git push
