<svg width="1500" height="120" viewBox="0 0 1500 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="f1" cx="15%" cy="50%" r="30%">
      <stop offset="0%" stop-color="#0e8f7a" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#0a0a1e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="f2" cx="50%" cy="45%" r="34%">
      <stop offset="0%" stop-color="#0e3a9f" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#0a0a1e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="f3" cx="82%" cy="55%" r="26%">
      <stop offset="0%" stop-color="#8f6a0e" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#0a0a1e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fg1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="75%" stop-color="#bbe8ff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#bbe8ff" stop-opacity="1"/>
    </linearGradient>
    <style>
      @keyframes tw{0%,100%{opacity:1}50%{opacity:.07}}
      .s1{animation:tw 2.0s 0.0s ease-in-out infinite}
      .s2{animation:tw 2.4s 0.5s ease-in-out infinite}
      .s3{animation:tw 1.7s 0.9s ease-in-out infinite}
      .s4{animation:tw 3.1s 0.2s ease-in-out infinite}
      .s5{animation:tw 2.6s 1.3s ease-in-out infinite}
      .s6{animation:tw 1.5s 0.7s ease-in-out infinite}
      .s7{animation:tw 3.6s 1.1s ease-in-out infinite}
      .s8{animation:tw 2.9s 1.7s ease-in-out infinite}
      .s9{animation:tw 4.1s 0.4s ease-in-out infinite}
      .s0{animation:tw 1.8s 2.0s ease-in-out infinite}
    </style>
  </defs>

  <rect width="1500" height="120" fill="#0a0a1e"/>

  <rect width="1500" height="120" fill="url(#f1)">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="7s" begin="1s" repeatCount="indefinite"/>
  </rect>
  <rect width="1500" height="120" fill="url(#f2)">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="9s" begin="0s" repeatCount="indefinite"/>
  </rect>
  <rect width="1500" height="120" fill="url(#f3)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="6s" begin="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Shooting star – teal tint, -11 deg -->
  <g transform="rotate(-11,750,60)">
    <rect x="-100" y="45" width="100" height="1.5" fill="url(#fg1)" opacity="0">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="2200,0" dur="11s" begin="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0;0.9;0.9;0;0" keyTimes="0;0.05;0.08;0.28;0.33;1" dur="11s" begin="3s" repeatCount="indefinite"/>
    </rect>
  </g>

