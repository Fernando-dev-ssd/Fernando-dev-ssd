<svg width="1500" height="150" viewBox="0 0 1500 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="n1" cx="18%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#4a0e8f" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#0a0a1e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="n2" cx="55%" cy="45%" r="30%">
      <stop offset="0%" stop-color="#0e4a9f" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#0a0a1e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="n3" cx="82%" cy="58%" r="26%">
      <stop offset="0%" stop-color="#8f0e6a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0a0a1e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="n4" cx="40%" cy="28%" r="18%">
      <stop offset="0%" stop-color="#1e3a8f" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#0a0a1e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cg1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="75%" stop-color="white" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="white" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="cg2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b8d4ff" stop-opacity="0"/>
      <stop offset="75%" stop-color="#b8d4ff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#b8d4ff" stop-opacity="1"/>
    </linearGradient>
    <style>
      @keyframes tw{0%,100%{opacity:1}50%{opacity:.07}}
      .s1{animation:tw 2.0s 0.0s ease-in-out infinite}
      .s2{animation:tw 2.4s 0.5s ease-in-out infinite}
      .s3{animation:tw 1.7s 0.9s ease-in-out infinite}
      .s4{animation:tw 3.1s 0.2s ease-in-out infinite}
      .s5{animation:tw 2.6s 1.3s ease-in-out infinite}
      .s6{animation:tw 1.5s 0.7s ease-in-out infinite}
      .s7{animation:tw 3.6s 1.1s ease-in-out infinite}
      .s8{animation:tw 2.9s 1.7s ease-in-out infinite}
      .s9{animation:tw 4.1s 0.4s ease-in-out infinite}
      .s0{animation:tw 1.8s 2.0s ease-in-out infinite}
    </style>
  </defs>

  <rect width="1500" height="150" fill="#0a0a1e"/>

  <rect width="1500" height="150" fill="url(#n1)">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="6s" begin="0s" repeatCount="indefinite"/>
  </rect>
  <rect width="1500" height="150" fill="url(#n2)">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="8s" begin="2s" repeatCount="indefinite"/>
  </rect>
  <rect width="1500" height="150" fill="url(#n3)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="7s" begin="4s" repeatCount="indefinite"/>
  </rect>
  <rect width="1500" height="150" fill="url(#n4)">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="9s" begin="1s" repeatCount="indefinite"/>
  </rect>

  <!-- Shooting star 1 – white, -14 deg -->
  <g transform="rotate(-14,750,75)">
    <rect x="-120" y="32" width="120" height="1.8" fill="url(#cg1)" opacity="0">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="2200,0" dur="10s" begin="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.05;0.08;0.30;0.35;1" dur="10s" begin="1.5s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Shooting star 2 – blue tint, -9 deg -->
  <g transform="rotate(-9,750,75)">
    <rect x="-90" y="108" width="90" height="1.4" fill="url(#cg2)" opacity="0">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="2200,0" dur="10s" begin="6.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0;0.85;0.85;0;0" keyTimes="0;0.05;0.08;0.28;0.33;1" dur="10s" begin="6.5s" repeatCount="indefinite"/>
    </rect>
  </g>

